<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản E-Commerce.</title>
</head>
<body>
    <form action="#" method="POST">
        <h2>Đăng ký thành viên</h2>

        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <label for="fullname">Họ tên:</label>
            <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Nhập họ và tên đầy đủ">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="vi_du@email.com">

            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0901234567" title="Vui lòng nhập đúng 10 chữ số">

            <label for="dob">Ngày sinh:</label>
            <input type="date" id="dob" name="dob" max="2026-04-27">
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <label for="username">Tên đăng nhập:</label>
            <input type="text" id="username" name="username" pattern="[A-Za-z0-9_]{3,20}" placeholder="3-20 ký tự, chữ, số hoặc _">

            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" name="password" required minlength="8" 
                   pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
                   placeholder="Ít nhất 8 ký tự, 1 chữ hoa, 1 số">

            <label for="confirm_password">Xác nhận mật khẩu:</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Nhập lại mật khẩu giống phía trên">
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="city">Thành phố:</label>
            <select id="city" name="city">
                <option value="">-- Chọn Thành phố --</option>
                <option value="HN">Hà Nội</option>
                <option value="HCM">TP. Hồ Chí Minh</option>
                <option value="DN">Đà Nẵng</option>
                <option value="HP">Hải Phòng</option>
                <option value="CT">Cần Thơ</option>
            </select>

            <label for="address">Địa chỉ chi tiết:</label>
            <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường, phường/xã..."></textarea>

            <label>Giới tính:</label>
            <div class="radio-group">
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Nam</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Nữ</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Khác</label>
            </div>
        </fieldset>

        <label>
            <input type="checkbox" name="agree" required style="width: auto;">
            Tôi đồng ý với các điều khoản dịch vụ
        </label>

        <div class="btn-group">
            <button type="submit">Đăng ký</button>
            <button type="reset">Nhập lại</button>
        </div>
    </form>
</body>
</html>
