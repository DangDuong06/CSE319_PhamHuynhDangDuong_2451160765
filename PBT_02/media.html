<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang giới thiệu sản phẩm có multimedia</title>
</head>
<body>
    <svg width="50" height="50"><circle cx="25" cy="25" r="20" fill="blue" /></svg>

<figure>
    <img src="https://placehold.co/200" alt="Sách mẫu" style="max-width: 100%; height: auto;" loading="lazy">
    <figcaption>Sách hướng dẫn IT - 100k</figcaption>
</figure>

<iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" loading="lazy"></iframe>

<video controls poster="thumb.jpg" width="500">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
</video>

<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
</audio>
</body>
</html>
